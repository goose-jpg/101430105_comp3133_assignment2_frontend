<div class="page-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <div class="card-header-content">
        <mat-icon class="header-icon">business</mat-icon>
        <mat-card-title>Employee Management</mat-card-title>
        <mat-card-subtitle>Sign in to your account</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <mat-icon matPrefix>person</mat-icon>
          <input matInput formControlName="username" placeholder="Enter username">
          <mat-error *ngIf="f['username'].hasError('required')">
            Username is required
          </mat-error>
          <mat-error *ngIf="f['username'].hasError('minlength')">
            Username must be at least 3 characters
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput type="password" formControlName="password" placeholder="Enter password">
          <mat-error *ngIf="f['password'].hasError('required')">
            Password is required
          </mat-error>
          <mat-error *ngIf="f['password'].hasError('minlength')">
            Password must be at least 6 characters
          </mat-error>
        </mat-form-field>

        <div class="error-banner" *ngIf="error">
          <mat-icon>error</mat-icon> {{ error }}
        </div>

        <button mat-raised-button color="primary" type="submit"
          class="full-width submit-btn"
          [disabled]="form.invalid || loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Login</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions class="card-footer">
      <p>Don't have an account? <a routerLink="/signup">Sign up here</a></p>
    </mat-card-actions>
  </mat-card>
</div>
